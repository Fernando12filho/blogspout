{% extends "base.html" %}

{% block title %}Write New Post - pout.blog{% endblock %}

{% block content %}
<div class="admin-new-post">
    <h1>Write New Post</h1>
    
    <form method="post" class="post-form">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
        </div>
        
        <div class="form-group">
            <label for="topic">Topic:</label>
            <select id="topic" name="topic">
                <option value="misc">Misc</option>
                <option value="tech">Tech</option>
                <option value="health">Health</option>
                <option value="fitness">Fitness</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="body">Body (Markdown):</label>
            <textarea id="body" name="body" rows="15" required></textarea>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="publish">
                Publish immediately (otherwise save as draft)
            </label>
        </div>
        
        <div class="form-actions">
            <button type="submit">Save Post</button>
            <a href="{{ url_for('admin_dashboard') }}" class="button button--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
