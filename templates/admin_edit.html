{% extends "base.html" %}

{% block title %}Edit Post - pout.blog{% endblock %}

{% block content %}
<div class="admin-edit-post">
    <h1>Edit Post</h1>
    
    <form method="post" class="post-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="topic">Topic:</label>
            <select id="topic" name="topic">
                <option value="misc" {% if post.topic == 'misc' %}selected{% endif %}>Misc</option>
                <option value="tech" {% if post.topic == 'tech' %}selected{% endif %}>Tech</option>
                <option value="health" {% if post.topic == 'health' %}selected{% endif %}>Health</option>
                <option value="fitness" {% if post.topic == 'fitness' %}selected{% endif %}>Fitness</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="body">Body (Markdown):</label>
            <textarea id="body" name="body" rows="15" required>{{ post.body_md }}</textarea>
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="publish" {% if post.draft == 0 %}checked{% endif %}>
                Published
            </label>
        </div>
        
        <div class="form-actions">
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('admin_dashboard') }}" class="button button--secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
